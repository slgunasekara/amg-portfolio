<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TASK_03</title>
    <meta name="description" content="">

    <meta property="og:title" content="">
    <meta property="og:type" content="">
    <meta property="og:url" content="">
    <meta property="og:image" content="">
    <meta property="og:image:alt" content="">

    <meta name="theme-color" content="#fafafa">
    <style>

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }

        .eclipsesIn{
            position: relative;
            width: 100%;
            height: 100%;
        }

        .Ecl01 {
            position: absolute;
            width: 40vmin;
            height: 40vmin;
            border-radius: 50%;
            background: #333333;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }

        .Ecl02 {
            position: absolute;
            width: 30vmin;
            height: 30vmin;
            border-radius: 50%;
            background: red;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
        }

        .Ecl03 {
            position: absolute;
            width: 20vmin;
            height: 20vmin;
            border-radius: 50%;
            background: gold;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
        }

        h1{
            margin: 0;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

    </style>
</head>
<body>

    <section class="eclipsesIn">
        <div class="Ecl01">
            <div class="Ecl02">
                <div class="Ecl03">
                    <h1>Hello</h1>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
