<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TASK_04</title>
    <style>

        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
        }

        .circleWrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50vmin;
            height: 50vmin;
        }

        .waterCircle {
            position: absolute;
            border-radius: 50%;
            border: 0.5vmin solid red;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: waterDrop 4s linear infinite;
        }

        @keyframes waterDrop {
            0% {
                width: 0;
                height: 0;
            }
            25% {
                width: 25%;
                height: 25%;
                border: 0.5vmin solid gold;
            }
            50% {
                width: 50%;
                height: 50%;
                border: 0.5vmin solid darkorchid;
            }
            75% {
                width: 75%;
                height: 75%;
                border: 0.5vmin solid chartreuse;
            }
            100% {
                width: 100%;
                height: 100%;
                border: 0.5vmin solid deeppink;
            }
        }
    </style>
</head>
<body>
    <div class="circleWrapper">
        <div class="waterCircle"></div>
    </div>
</body>
</html>
