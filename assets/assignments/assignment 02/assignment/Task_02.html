<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TASK_03</title>
    <style>

        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
        }

        .circleWrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50vmin;
            height: 50vmin;
        }

        .circle {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3vmin solid gray;
            border-top-color: red;
            border-radius: 50%;
            background-color: green;
        }

        .circleWrapper:hover .circle {
            animation: rotateBorder 3s linear;
        }

        .insideText {
            position: absolute;
            margin: 0;
            top: 55%;
            left: 55%;
            transform: translate(-50%, -50%);
            color: white;
            z-index: 1;
        }

        @keyframes rotateBorder {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

    </style>
</head>
<body>

    <div class="circleWrapper">
        <div class="circle"></div>
        <h1 class="insideText">ROTATE</h1>
    </div>

</body>
</html>
